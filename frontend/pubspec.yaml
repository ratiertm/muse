name: muse
description: "Muse - AI Character Chat App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.6.1
  
  # Network
  dio: ^5.7.0
  http: ^1.2.2
  
  # Routing
  go_router: ^14.6.2
  
  # Storage
  shared_preferences: ^2.3.4
  
  # UI Components
  cached_network_image: ^3.4.1
  flutter_markdown: ^0.7.4+1
  
  # Utilities
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  uuid: ^4.5.1
  intl: ^0.20.2
  
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  
  # Code Generation (simplified - no custom_lint to avoid conflicts)
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
