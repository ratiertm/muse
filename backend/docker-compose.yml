version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: charbot-postgres
    environment:
      POSTGRES_DB: charbot
      POSTGRES_USER: charbot
      POSTGRES_PASSWORD: charbot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U charbot"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
